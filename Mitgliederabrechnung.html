  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  // Firebase Konfiguration (gleich wie in der anderen Datei)
  const firebaseConfig = {
    apiKey: "AIzaSyD5B4C8EiEdLA2XWLzb2JvcFi9DAnV1M7E",
    authDomain: "thedeersabrechnung.firebaseapp.com",
    projectId: "thedeersabrechnung",
    storageBucket: "thedeersabrechnung.firebasestorage.app",
    messagingSenderId: "27261468983",
    appId: "1:27261468983:web:1a6340756263aad9455ab2",
    measurementId: "G-6KBNXWTYJ1"
  };

  // Firebase initialisieren
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  // Firebase Funktionen global verfügbar machen
  window.firebaseDB = db;
  window.firebaseAuth = auth;
  window.firebaseUtils = { collection, addDoc, getDocs, updateDoc, doc, deleteDoc };
  window.authUtils = { signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut };
  window.firebaseReady = true;

  // Auth State Observer - HIER DARF LOADMEMBERSFRFIREBASE NICHT AUFGERUFEN WERDEN
  onAuthStateChanged(auth, (user) => {
    console.log('Auth state changed:', user ? 'Benutzer angemeldet' : 'Benutzer abgemeldet');
    window.currentFirebaseUser = user;
    
    if (user) {
      // Benutzer ist angemeldet
      console.log('Angemeldet als:', user.email);
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('mainApp').classList.remove('hidden');
      
      // Nur UI updaten, nicht loadMembersFromFirebase aufrufen
      // Das wird vom Login-Handler aufgerufen
      
    } else {
      // Benutzer ist nicht angemeldet
      console.log('Benutzer abgemeldet');
      document.getElementById('loginPage').classList.remove('hidden');
      document.getElementById('mainApp').classList.add('hidden');
    }
  });

  // Event für Firebase-Initialisierung
  window.dispatchEvent(new Event('firebaseReady'));
</script>

<script>
// Globale Variablen
let members = [];
let articles = [
  { name: 'Softdrink/Wasser', type: 'drink', price: 2.50 },
  { name: 'Bier des Monats', type: 'drink', price: 3.50 },
  { name: 'Krausenbier', type: 'drink', price: 3.00 },
  { name: 'Weizen', type: 'drink', price: 3.50 },
  { name: 'Winzerschorle', type: 'drink', price: 4.50 },
  { name: 'Kaffee/Tee', type: 'drink', price: 1.50 },
  { name: 'Cola', type: 'drink', price: 2.50 },
  { name: 'Pizza', type: 'food', price: 9.00 },
  { name: 'Chicken Nuggets', type: 'food', price: 5.00 },
  { name: 'Chilli Cheese Nuggets', type: 'food', price: 5.00 },
  { name: 'Riegel', type: 'food', price: 1.00 }
];

let currentMemberId = null;
let selectedFavorites = [];
let currentBookingMemberId = null;
let currentSettlementMemberId = null;
let confirmCallback = null;
let isLoggedIn = false;
let currentUser = null;
let loadMembersTimeout = null;

// Toast-Funktionen
function showToast(message, type = 'success') {
  const existingToasts = document.querySelectorAll('.toast');
  existingToasts.forEach(toast => toast.remove());

  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  document.body.appendChild(toast);

  setTimeout(() => toast.classList.add('show'), 100);

  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

// Bestätigung Modal
function showConfirm(message, callback) {
  document.getElementById('confirmMessage').textContent = message;
  confirmCallback = callback;
  document.getElementById('modalConfirm').classList.remove('hidden');
}

document.getElementById('btnConfirmCancel').addEventListener('click', () => {
  document.getElementById('modalConfirm').classList.add('hidden');
  confirmCallback = null;
});

document.getElementById('btnConfirmOk').addEventListener('click', () => {
  if (confirmCallback) {
    confirmCallback();
    confirmCallback = null;
  }
  document.getElementById('modalConfirm').classList.add('hidden');
});

// Firebase Funktionen
async function saveMemberToFirebase(memberData) {
  try {
    if (!window.firebaseDB) {
      console.warn('Firebase nicht initialisiert');
      showToast('Firebase nicht initialisiert', 'error');
      return null;
    }
    
    const docRef = await window.firebaseUtils.addDoc(
      window.firebaseUtils.collection(window.firebaseDB, "mitglieder"), 
      {
        ...memberData,
        createdAt: new Date().toISOString()
      }
    );
    console.log("Mitglied in Firebase gespeichert mit ID: ", docRef.id);
    return docRef.id;
  } catch (error) {
    console.error("Fehler beim Speichern in Firebase: ", error);
    showToast('Fehler beim Speichern: ' + error.message, 'error');
    return null;
  }
}

async function updateMemberInFirebase(memberId, memberData) {
  try {
    if (!window.firebaseDB || !memberId) {
      console.warn('Firebase nicht initialisiert oder keine Member-ID');
      return false;
    }
    
    const memberRef = window.firebaseUtils.doc(window.firebaseDB, "mitglieder", memberId);
    await window.firebaseUtils.updateDoc(memberRef, {
      ...memberData,
      updatedAt: new Date().toISOString()
    });
    console.log("Mitglied in Firebase aktualisiert:", memberId);
    return true;
  } catch (error) {
    console.error("Fehler beim Aktualisieren in Firebase: ", error);
    showToast('Fehler beim Aktualisieren: ' + error.message, 'error');
    return false;
  }
}

async function loadMembersFromFirebase() {
  try {
    if (!window.firebaseDB) {
      console.warn('Firebase nicht initialisiert');
      return;
    }
    
    const querySnapshot = await window.firebaseUtils.getDocs(
      window.firebaseUtils.collection(window.firebaseDB, "mitglieder")
    );
    
    members = [];
    querySnapshot.forEach((doc) => {
      members.push({
        id: doc.id,
        ...doc.data()
      });
    });
    
    renderMembers();
  } catch (error) {
    console.error("Fehler beim Laden aus Firebase: ", error);
  }
}

// UI Funktionen
function showPage(page) {
  console.log('Zeige Seite:', page);
  
  const membersPage = document.getElementById('page-members');
  const reportsPage = document.getElementById('page-reports');
  
  membersPage.classList.add('hidden');
  reportsPage.classList.add('hidden');
  
  const currentPage = document.getElementById('page-' + page);
  if (currentPage) {
    currentPage.classList.remove('hidden');
  }
  
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.classList.remove('bg-gray-400');
    btn.classList.add('bg-gray-300');
  });
  
  const activeBtn = document.getElementById('btn-' + page);
  if (activeBtn) {
    activeBtn.classList.remove('bg-gray-300');
    activeBtn.classList.add('bg-gray-400');
  }
}

// Mitglied hinzufügen
document.getElementById('btnNewMember').addEventListener('click', () => {
  document.getElementById('inputMemberName').value = '';
  selectedFavorites = [];
  currentMemberId = null;
  renderFavoritesCheckboxes();
  document.getElementById('modalAddMember').classList.remove('hidden');
});

document.getElementById('btnCancelMember').addEventListener('click', () => {
  document.getElementById('modalAddMember').classList.add('hidden');
});

function renderFavoritesCheckboxes() {
  const container = document.getElementById('favoritesCheckboxList');
  container.innerHTML = '';

  articles.forEach((article, index) => {
    const div = document.createElement('div');
    div.className = 'checkbox-item';
    const isSelected = selectedFavorites.includes(index);
    
    div.innerHTML = `
      <input type="checkbox" id="fav-${index}" ${isSelected ? 'checked' : ''} />
      <label for="fav-${index}">
        ${article.name} (${article.price.toFixed(2)} €)
      </label>
    `;

    const checkbox = div.querySelector('input[type="checkbox"]');
    checkbox.addEventListener('change', () => {
      if (checkbox.checked && selectedFavorites.length < 5) {
        selectedFavorites.push(index);
      } else {
        selectedFavorites = selectedFavorites.filter(i => i !== index);
      }
      updateFavoritesCount();
    });

    container.appendChild(div);
  });

  updateFavoritesCount();
}

function updateFavoritesCount() {
  document.getElementById('favoritesCount').textContent = `${selectedFavorites.length} / 5 ausgewählt`;
}

document.getElementById('btnSaveMember').addEventListener('click', async () => {
  const name = document.getElementById('inputMemberName').value.trim();

  if (!name) {
    showToast('Bitte geben Sie einen Namen ein.', 'error');
    return;
  }

  const favoriteArticles = selectedFavorites.map(i => articles[i]);

  const memberData = {
    name: name,
    favorites: favoriteArticles,
    isActive: true,
    balance: 0.00,
    bookings: []
  };

  const memberId = await saveMemberToFirebase(memberData);
  if (memberId) {
    memberData.id = memberId;
    members.push(memberData);
    renderMembers();
    document.getElementById('modalAddMember').classList.add('hidden');
    showToast('Mitglied erfolgreich hinzugefügt!');
  } else {
    showToast('Fehler beim Speichern des Mitglieds.', 'error');
  }
});

// Mitgliederliste rendern
function renderMembers() {
  const container = document.getElementById('membersContainer');
  
  if (members.length === 0) {
    container.innerHTML = '<p class="text-gray-500 text-center">Noch keine Mitglieder angelegt.</p>';
    return;
  }

  container.innerHTML = '';

  const table = document.createElement('table');
  table.className = 'w-full border-collapse bg-white shadow rounded overflow-hidden';
  
  table.innerHTML = `
    <thead class="bg-gray-200">
      <tr>
        <th class="p-3 border text-left">Name</th>
        <th class="p-3 border text-right">Ausstehend</th>
        <th class="p-3 border text-center">Buchung hinzufügen</th>
        <th class="p-3 border text-center">Abrechnen</th>
        <th class="p-3 border text-center">Historie</th>
        <th class="p-3 border text-center">Aktion</th>
      </tr>
    </thead>
    <tbody id="membersTableBody">
    </tbody>
  `;

  container.appendChild(table);

  const tbody = document.getElementById('membersTableBody');

  members.forEach((member, index) => {
    const row = document.createElement('tr');
    const isInactive = !member.isActive;
    
    if (isInactive) {
      row.classList.add('inactive-row');
    }

    const balance = (member.balance || 0).toFixed(2);

    row.innerHTML = `
      <td class="p-3 border">${member.name}</td>
      <td class="p-3 border text-right">${balance} €</td>
      <td class="p-3 border text-center">
        ${!isInactive ? `
          <button onclick="openBookingModal('${member.id}')" title="Buchung hinzufügen" class="text-lg hover:text-2xl">
            🍔🍹
          </button>
        ` : '-'}
      </td>
      <td class="p-3 border text-center">
        ${!isInactive ? `
          <button onclick="openSettlementModal('${member.id}')" title="Abrechnen" class="text-lg hover:text-2xl">
            💰
          </button>
        ` : '-'}
      </td>
      <td class="p-3 border text-center">
        ${!isInactive ? `
          <button onclick="openHistoryModal('${member.id}')" title="Verlauf anzeigen" class="text-lg hover:text-2xl">
            📋
          </button>
        ` : '-'}
      </td>
      <td class="p-3 border text-center">
        ${!isInactive ? `
          <button onclick="deactivateMember('${member.id}')" title="Mitglied inaktivieren" class="text-lg hover:text-2xl text-red-600 hover:text-red-700">
            ❌
          </button>
        ` : `
          <button onclick="reactivateMember('${member.id}', ${parseFloat(balance) !== 0})" 
                  title="${parseFloat(balance) !== 0 ? 'Kann nicht reaktiviert werden - Ausstehend ungleich 0€' : 'Mitglied reaktivieren'}"
                  class="text-lg hover:text-2xl ${parseFloat(balance) !== 0 ? 'opacity-50 cursor-not-allowed' : 'text-green-600 hover:text-green-700'}"
                  ${parseFloat(balance) !== 0 ? 'disabled' : ''}>
            ♻️
          </button>
        `}
      </td>
    `;

    tbody.appendChild(row);
  });
}

// Abrechnung Modal
function openSettlementModal(memberId) {
  currentSettlementMemberId = memberId;
  const member = members.find(m => m.id === memberId);
  
  if (!member) return;

  document.getElementById('settlementMemberName').textContent = `Abrechnung für: ${member.name}`;

function renderArticlesList(containerId, type) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';

  articles.filter(a => a.type === type).forEach((article) => {
    const div = document.createElement('div');
    div.className = 'checkbox-item';
    div.innerHTML = `
      <input type="checkbox" id="article-${article.name}" />
      <label for="article-${article.name}">
        ${article.name} (${article.price.toFixed(2)} €)
      </label>
    `;
    container.appendChild(div);
  });
}

document.getElementById('btnCancelBooking').addEventListener('click', () => {
  document.getElementById('modalAddBooking').classList.add('hidden');

});

document.getElementById('btnCancelSettlement').addEventListener('click', () => {
  document.getElementById('modalSettlement').classList.add('hidden');

document.getElementById('btnSaveBooking').addEventListener('click', async () => {
  if (!currentBookingMemberId) return;

  const member = members.find(m => m.id === currentBookingMemberId);
  if (!member) return;

  const amount = parseFloat(document.getElementById('bookingAmount').value) || 0;
  const date = document.getElementById('bookingDate').value;

  if (amount <= 0) {
    showToast('Bitte geben Sie einen Betrag ein.', 'error');
    return;
  }

  if (!date) {
    showToast('Bitte wählen Sie ein Datum.', 'error');
    return;
  }

  // Getränke sammeln
  const selectedDrinks = [];
  document.querySelectorAll('#drinksList input[type="checkbox"]:checked').forEach(checkbox => {
    const label = checkbox.nextElementSibling.textContent;
    selectedDrinks.push(label.split('(')[0].trim());
  });

  // Essen sammeln
  const selectedFood = [];
  document.querySelectorAll('#foodList input[type="checkbox"]:checked').forEach(checkbox => {
    const label = checkbox.nextElementSibling.textContent;
    selectedFood.push(label.split('(')[0].trim());
  });

  const booking = {
    date: date,
    amount: amount,
    drinks: selectedDrinks,
    food: selectedFood,
    createdAt: new Date().toISOString()
  };

  // Aktualisiere Mitglied
  if (!member.bookings) {
    member.bookings = [];
  }
  member.bookings.push(booking);
  member.balance = (member.balance || 0) + amount;

  const success = await updateMemberInFirebase(currentBookingMemberId, {
    bookings: member.bookings,
    balance: member.balance
  });

  if (success) {
    renderMembers();
    document.getElementById('modalAddBooking').classList.add('hidden');
    currentBookingMemberId = null;
    showToast('Buchung erfolgreich hinzugefügt!');
  } else {
    showToast('Fehler beim Speichern der Buchung.', 'error');
  }
});

document.getElementById('btnSaveSettlement').addEventListener('click', async () => {
  if (!currentSettlementMemberId) return;

  const member = members.find(m => m.id === currentSettlementMemberId);
  if (!member) return;

  const paidAmount = parseFloat(document.getElementById('settlementPaidAmount').value) || 0;
  const date = document.getElementById('settlementDate').value;

  if (paidAmount <= 0) {
    showToast('Bitte geben Sie einen Betrag ein.', 'error');
    return;
  }

  if (!date) {
    showToast('Bitte wählen Sie ein Datum.', 'error');
    return;
  }

  // Neue Balance nach Zahlung
  member.balance = (member.balance || 0) - paidAmount;

  const success = await updateMemberInFirebase(currentSettlementMemberId, {
    balance: member.balance
  });

  if (success) {
    renderMembers();
    document.getElementById('modalSettlement').classList.add('hidden');
    currentSettlementMemberId = null;
    showToast('Abrechnung erfolgreich durchgeführt!');
  } else {
    showToast('Fehler beim Speichern der Abrechnung.', 'error');
  }
});

// Historia Modal öffnen
function openHistoryModal(memberId) {
  const member = members.find(m => m.id === memberId);
  if (!member) return;

  document.getElementById('historyMemberName').textContent = member.name;
  const tbody = document.getElementById('historyTableBody');
  tbody.innerHTML = '';

  if (!member.bookings || member.bookings.length === 0) {
    tbody.innerHTML = '<tr><td class="p-2 border text-center" colspan="3">Keine Buchungen vorhanden.</td></tr>';
  } else {
    member.bookings.forEach(booking => {
      const row = document.createElement('tr');
      const details = [];
      if (booking.drinks && booking.drinks.length > 0) {
        details.push('Getränke: ' + booking.drinks.join(', '));
      }
      if (booking.food && booking.food.length > 0) {
        details.push('Essen: ' + booking.food.join(', '));
      }
      
      row.innerHTML = `
        <td class="p-2 border">${new Date(booking.date).toLocaleDateString('de-DE')}</td>
        <td class="p-2 border text-right">${booking.amount.toFixed(2)} €</td>
        <td class="p-2 border">${details.length > 0 ? details.join(' | ') : '-'}</td>
      `;
      tbody.appendChild(row);
    });
  }

  document.getElementById('modalHistory').classList.remove('hidden');
}

document.getElementById('btnCloseHistory').addEventListener('click', () => {
  document.getElementById('modalHistory').classList.add('hidden');
});

// Mitglied inaktivieren
function deactivateMember(memberId) {
  const member = members.find(m => m.id === memberId);
  if (!member) return;

  showConfirm(`Möchten Sie ${member.name} wirklich inaktivieren? Das Mitglied wird grau angezeigt und kann nicht mehr bearbeitet werden.`, () => {
    member.isActive = false;
    updateMemberInFirebase(memberId, { isActive: false }).then(() => {
      renderMembers();
      showToast('Mitglied inaktiviert.');
    });
  });
}

// Mitglied reaktivieren
function reactivateMember(memberId, hasBalance) {
  if (hasBalance) {
    showToast('Mitglied kann nicht reaktiviert werden - Ausstehend ungleich 0,00 €', 'warning');
    return;
  }

  const member = members.find(m => m.id === memberId);
  if (!member) return;

  showConfirm(`Möchten Sie ${member.name} reaktivieren?`, () => {
    member.isActive = true;
    updateMemberInFirebase(memberId, { isActive: true }).then(() => {
      renderMembers();
      showToast('Mitglied reaktiviert.');
    });
  });
}

// Login-Funktionalität
async function authenticateUser(email, password) {
  try {
    if (!window.firebaseAuth) {
      console.error('Firebase Auth nicht initialisiert');
      return false;
    }

    const userCredential = await window.authUtils.signInWithEmailAndPassword(
      window.firebaseAuth, 
      email, 
      password
    );
    
    console.log('Benutzer erfolgreich angemeldet:', userCredential.user);
    
    // Prüfe ob Benutzer in der users Collection existiert
    try {
      const usersSnapshot = await window.firebaseUtils.getDocs(
        window.firebaseUtils.collection(window.firebaseDB, "users")
      );
      
      let userExists = false;
      usersSnapshot.forEach(doc => {
        const userData = doc.data();
        if (userData.uid === userCredential.user.uid || userData.email === userCredential.user.email) {
          userExists = true;
          console.log('Benutzer in users Collection gefunden:', userData);
        }
      });
      
      if (!userExists) {
        console.warn('Benutzer existiert nicht in users Collection, erstelle Eintrag...');
        const userData = {
          email: userCredential.user.email,
          uid: userCredential.user.uid,
          isActive: true,
          createdAt: new Date().toISOString(),
          role: 'admin'
        };
        await window.firebaseUtils.addDoc(
          window.firebaseUtils.collection(window.firebaseDB, "users"), 
          userData
        );
        console.log('Benutzer in users Collection erstellt');
      }
    } catch (firebaseError) {
      console.warn('Fehler beim Prüfen der users Collection:', firebaseError);
      // Fehler hier ist nicht kritisch - fahre fort
    }
    
    return userCredential.user;
  } catch (error) {
    console.error("Fehler bei der Authentifizierung: ", error);
    
    if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
      throw new Error('Ungültige E-Mail oder Passwort');
    } else if (error.code === 'auth/invalid-email') {
      throw new Error('Ungültige E-Mail-Adresse');
    } else {
      throw new Error('Anmeldung fehlgeschlagen. Bitte versuchen Sie es erneut.');
    }
  }
}

// Logout
async function logout() {
  try {
    if (window.firebaseAuth) {
      await window.authUtils.signOut(window.firebaseAuth);
    }
    
    // Session clearen
    sessionStorage.removeItem('isLoggedIn');
    sessionStorage.removeItem('currentUser');
    
    // UI zurücksetzen
    document.getElementById('loginPage').classList.remove('hidden');
    document.getElementById('mainApp').classList.add('hidden');
    document.getElementById('loginForm').reset();
    document.getElementById('loginError').classList.add('hidden');
    
    isLoggedIn = false;
    currentUser = null;
    
    showToast('Erfolgreich abgemeldet.');
  } catch (error) {
    console.error('Logout-Fehler:', error);
    showToast('Fehler beim Abmelden.', 'error');
  }
}

// Login-Event
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const loginButton = document.getElementById('loginButton');
  const loginError = document.getElementById('loginError');
  
  if (!email || !password) {
    loginError.textContent = 'Bitte füllen Sie alle Felder aus.';
    loginError.classList.remove('hidden');
    return;
  }

  loginButton.disabled = true;
  loginButton.textContent = 'Anmelden...';
  loginError.classList.add('hidden');
  
  try {
    // Warten bis Firebase bereit ist
    if (!window.firebaseReady) {
      await new Promise(resolve => {
        if (window.firebaseReady) {
          resolve();
        } else {
          window.addEventListener('firebaseReady', resolve, { once: true });
          setTimeout(resolve, 3000);
        }
      });
    }
    
    const user = await authenticateUser(email, password);
    
    if (user) {
      // Erfolgreicher Login
      isLoggedIn = true;
      currentUser = user;
      
      // Session speichern
      sessionStorage.setItem('isLoggedIn', 'true');
      sessionStorage.setItem('currentUser', JSON.stringify(user));
      
      // UI wechseln
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('mainApp').classList.remove('hidden');
      
      // Bestehende Daten laden
      await loadMembersFromFirebase();
      showPage('members');
      
      showToast('Erfolgreich angemeldet!');
    }
  } catch (error) {
    console.error('Login-Fehler:', error);
    loginError.textContent = error.message || 'Ein Fehler ist aufgetreten. Bitte versuchen Sie es erneut.';
    loginError.classList.remove('hidden');
  } finally {
    loginButton.disabled = false;
    loginButton.textContent = 'Anmelden';
  }
});
